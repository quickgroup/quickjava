# Application
app:
  hostname: "0.0.0.0"
  port: 8200
  debug: true
  version: 1.0
  versionCode: 101000
  lang: zh-CN     # 默认语言
  charset: UTF-8  # 全局默认字符集

url:
  caseSensitive: false  # 默认忽略大小写
  static:     # 静态资源文件夹
    ["static"]

# module
module:
  default:
    module: index       # 默认模块
    controller: index   # 默认控制器
    action: index       # 默认方法
  dirname:    # 目录名称，相对模块的路径
    controller: module   # 控制器包名
    model: model   # 模型包名
    view: view     # 视图包名
    lang: lang     # 语言包名
    validator: validator  # 验证器包名
  forb: # 禁止访问的模块
    ["common"]

# view
view:
  cache: true
  engine: default # 模板引擎

# session
session:
  type: memory      # 保存方式，支持：file、memory
  name: QSESSION    # session 名
  format: md5       # session ID 生成方式
  expire: 604800    # 有效时间，秒，默认7天
  httponly: true    # 绑定http协议

# Exception
exception:
  handle: default   # 处理方式，default=默认框架处理
  defaultMessage: 页面暂时无法访问

log:
  name: demo
  handle: default
  path: "log"   # 日志目录，工作目录相对路径
  fileName: "%y-%m-%d.log"
  level: DEBUG

# Database
database:
  url: jdbc:mysql://127.0.0.1:3306/?useUnicode=true&characterEncoding=utf-8
  database: quickjava
  username: quickjava
  password: quickjava
